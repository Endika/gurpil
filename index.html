<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a1a2e" />
    <title>Gurpil</title>
    <!-- Root-absolute hrefs: Vite rewrites them to the /gurpil/ base at build. -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
    </style>
    <style>
      /* Prevent accidental zoom on mobile: block double-tap zoom, keep scroll/tap. */
      html {
        touch-action: manipulation;
      }
    </style>
    <script>
      // iOS Safari ignores user-scalable=no, so block pinch-zoom explicitly.
      document.addEventListener('gesturestart', function (e) {
        e.preventDefault()
      })
    </script>
  </head>
  <body>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
